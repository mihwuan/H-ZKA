# ================================================================
# zkCross Docker Compose — 10 VMs × 20 Nodes = 200 Nodes
# ================================================================
#
# Topology (per VM):
#   10 chains × 2 sealers/chain = 20 Docker geth nodes
#   ChainId = VM_ID * 100 + chain_index  (e.g. VM 1: 101-110, VM 2: 201-210)
#
# Deployment: 10 VMs × 10 chains = 100 chains, 200 nodes total
#
# Set VM_ID in .env file (VM 1-10)
#
# Ports (per VM, offset by VM_ID):
#   Chain 1:  8545 + offset, 30301 + offset
#   Chain 2:  8547 + offset, 30303 + offset
#   ...
#   Chain 10: 8563 + offset, 30319 + offset

x-node-common: &node-common
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  stop_grace_period: 10s

x-sealer-addrs: &sealer-addrs
  SEALER_ADDRS: "15B46da1D66D8B63a25284c12A415e128fb927e0,d9F218cb21F479e82993f04450a50F15E6ad56aa"

x-sealer1: &sealer1
  SEALER_KEY: "4c0883a69102937d6231471b5dbb6204fe512961708279f22f1da1c87a3b8b4b"
  SEALER_ADDR: "0x15B46da1D66D8B63a25284c12A415e128fb927e0"

x-sealer2: &sealer2
  SEALER_KEY: "7a12b6e4e3f8b2a1c9d0e5f6789abcdef0123456789abcdef0123456789abcd0"
  SEALER_ADDR: "0xd9F218cb21F479e82993f04450a50F15E6ad56aa"

x-healthcheck: &healthcheck
  test: ["CMD", "curl", "-sf", "-X", "POST", "-H", "Content-Type: application/json",
         "-d", "{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}",
         "http://localhost:8545"]
  interval: 5s
  timeout: 3s
  retries: 30

services:
  # ============ Chain 1 (chainId = ${VM_ID}01) ============
  node1-chain-1:
    <<: *node-common
    container_name: zkcross-vm${VM_ID:-1}-chain1-node1
    environment:
      <<: [*sealer1, *sealer-addrs]
      CHAIN_ID: "${VM_ID:-1}01"
      NETWORK_ID: "${VM_ID:-1}01"
    volumes:
      - node1_chain1_data:/data
    ports:
      - "${RPC_BASE:-8545}:8545"
      - "${P2P_BASE:-30301}:30303"
    networks:
      - chain_1_net
    healthcheck:
      <<: *healthcheck

  node2-chain-1:
    <<: *node-common
    container_name: zkcross-vm${VM_ID:-1}-chain1-node2
    environment:
      <<: [*sealer2, *sealer-addrs]
      CHAIN_ID: "${VM_ID:-1}01"
      NETWORK_ID: "${VM_ID:-1}01"
      PEER_RPC: "http://node1-chain-1:8545"
    volumes:
      - node2_chain1_data:/data
    ports:
      - "${RPC_BASE_ADD1:-8546}:8545"
      - "${P2P_BASE_ADD1:-30302}:30303"
    networks:
      - chain_1_net
    depends_on:
      node1-chain-1:
        condition: service_healthy

